name: CI

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 8 * * *"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and build
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: "3.14"
      - name: Install dependencies
        run: uv sync --locked
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .
      - name: License check
        run: uv run licensecheck --groups dev --zero
      - name: Build package
        run: uv build

  test:
    name: Python ${{ matrix.python-version }}, Django ${{ matrix.django-version }}
    runs-on: ubuntu-latest
    permissions: {}
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.9"
            django-version: "3.2"
            django-spec: "Django>=3.2.25,<3.3"
          - python-version: "3.9"
            django-version: "4.0"
            django-spec: "Django>=4.0,<4.1"
          - python-version: "3.9"
            django-version: "4.1"
            django-spec: "Django>=4.1,<4.2"
          - python-version: "3.9"
            django-version: "4.2"
            django-spec: "Django>=4.2,<4.3"
          - python-version: "3.10"
            django-version: "3.2"
            django-spec: "Django>=3.2.25,<3.3"
          - python-version: "3.10"
            django-version: "4.0"
            django-spec: "Django>=4.0,<4.1"
          - python-version: "3.10"
            django-version: "4.1"
            django-spec: "Django>=4.1,<4.2"
          - python-version: "3.10"
            django-version: "4.2"
            django-spec: "Django>=4.2,<4.3"
          - python-version: "3.10"
            django-version: "5.0"
            django-spec: "Django>=5.0,<5.1"
          - python-version: "3.10"
            django-version: "5.1"
            django-spec: "Django>=5.1,<5.2"
          - python-version: "3.10"
            django-version: "5.2"
            django-spec: "Django>=5.2,<5.3"
          - python-version: "3.11"
            django-version: "4.1"
            django-spec: "Django>=4.1,<4.2"
          - python-version: "3.11"
            django-version: "4.2"
            django-spec: "Django>=4.2,<4.3"
          - python-version: "3.11"
            django-version: "5.0"
            django-spec: "Django>=5.0,<5.1"
          - python-version: "3.11"
            django-version: "5.1"
            django-spec: "Django>=5.1,<5.2"
          - python-version: "3.11"
            django-version: "5.2"
            django-spec: "Django>=5.2,<5.3"
          - python-version: "3.12"
            django-version: "4.2"
            django-spec: "Django>=4.2,<4.3"
          - python-version: "3.12"
            django-version: "5.0"
            django-spec: "Django>=5.0,<5.1"
          - python-version: "3.12"
            django-version: "5.1"
            django-spec: "Django>=5.1,<5.2"
          - python-version: "3.12"
            django-version: "5.2"
            django-spec: "Django>=5.2,<5.3"
          - python-version: "3.12"
            django-version: "6.0"
            django-spec: "Django>=6.0,<6.1"
          - python-version: "3.13"
            django-version: "5.1"
            django-spec: "Django>=5.1,<5.2"
          - python-version: "3.13"
            django-version: "5.2"
            django-spec: "Django>=5.2,<5.3"
          - python-version: "3.13"
            django-version: "6.0"
            django-spec: "Django>=6.0,<6.1"
          - python-version: "3.14"
            django-version: "5.2"
            django-spec: "Django>=5.2,<5.3"
          - python-version: "3.14"
            django-version: "6.0"
            django-spec: "Django>=6.0,<6.1"
          - python-version: "3.14"
            django-version: "main"
            django-spec: "https://github.com/django/django/archive/main.tar.gz"
            experimental: true

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e .
          uv pip install "${{ matrix.django-spec }}" python-dotenv django-debug-toolbar

      - name: Run tests
        run: |
          uv run --no-sync python manage.py test
        env:
          DESCOPE_PROJECT_ID: P2ZRsmAQw8MKG78knGZ9GXWRqxM5
          DESCOPE_MANAGEMENT_KEY: ${{ secrets.DESCOPE_MANAGEMENT_KEY }}

  done:
    name: Build Matrix Complete
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions: {}
    if: always()
    steps:
      - name: Fail if any dependency failed or was cancelled
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
      - name: Done
        run: echo "Done"
